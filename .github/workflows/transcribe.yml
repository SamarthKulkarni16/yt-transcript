name: Weekly YouTube Transcription

on:
  schedule:
    # Runs every Monday at 06:00 UTC. Adjust as needed.
    # (Cron is in UTC -- IST is UTC+5:30, so 06:00 UTC = 11:30 AM IST)
    - cron: "0 6 * * 1"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # generous ceiling; actual runs should be far shorter

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
  
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for PO token provider server)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up PO token provider server
        run: |
          git clone https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /tmp/bgutil-pot
          cd /tmp/bgutil-pot/server
          npm install
          npx tsc
          nohup node build/main.js > /tmp/bgutil-pot.log 2>&1 &
          sleep 5
          cat /tmp/bgutil-pot.log

      - name: Run transcription pipeline
        run: python scripts/transcribe.py

      - name: Commit and push new transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ processed_ids.json
          git diff --staged --quiet || git commit -m "Add new transcripts $(date -u +'%Y-%m-%d')"
          git push
